services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-banco_doacoes}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-5050}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://10.0.0.4:5050}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@10.0.0.4:5432/banco_doacoes}
      JWT_SECRET: ${JWT_SECRET:-muda_esta_chave_secreta_123}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-hubble_refresh_secret_xK9_mP2_vL5nQ8wR}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      JWT_EMAIL_SECRET: ${JWT_EMAIL_SECRET:-hubble_email_secret_tY3_jH7_cN1sA6bE}
      JWT_EMAIL_EXPIRES_IN: ${JWT_EMAIL_EXPIRES_IN:-1d}
      JWT_RESET_SECRET: ${JWT_RESET_SECRET:-hubble_reset_secret_dF4_gU9_zW2mX0kV}
      JWT_RESET_EXPIRES_IN: ${JWT_RESET_EXPIRES_IN:-1h}
      FRONTEND_URL: ${FRONTEND_URL:-http://10.0.0.4:5051}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://10.0.0.4:5051}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-immilengohot@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-xnky vexe sjab otgn}
      MAIL_FROM: ${MAIL_FROM:-Fundação Hubble}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-488205875667-6e03cip586qkdcnfi7cijibqq2dgae2c.apps.googleusercontent.com}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-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}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://10.0.0.4:5050/auth/google/callback}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - '${BACKEND_PORT:-5050}:5050'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5050/health >/dev/null 2>&1 || exit 1']
      interval: 20s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://10.0.0.4:5050}
      PORT: ${FRONTEND_PORT:-5051}
    ports:
      - '${FRONTEND_PORT:-5051}:5051'

volumes:
  postgres_data:
  uploads_data:
